name: Deploy to ByetHost FTP

# Cette action se déclenche à chaque push sur la branche "main"
# (remplacez "main" par "master" si votre branche principale s'appelle master)
on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Déploiement FTP
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Récupération du code
        uses: actions/checkout@v3

      - name: 📂 Synchronisation FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          # Dossier de destination sur votre hébergeur (souvent htdocs)
          server-dir: amfs.22web.org/htdocs/
          # Fichiers et dossiers à NE PAS envoyer
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            tests/** # <-- Ignore tous les tests locaux (très lourd)
            user_guide_src/** # <-- Ignore la documentation de CI4
            phpunit.xml.dist
            .env
            spark
            README.md
            LICENSE
